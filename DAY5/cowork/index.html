<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cowork</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- 토스트 알림 -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- 인증 화면 -->
  <div id="auth-view" class="auth-view">
    <div class="auth-card">
      <h1 class="auth-title">cowork</h1>
      <p class="auth-subtitle">한 페이지에서 같이 보고 같이 쓰기</p>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="signin">로그인</button>
        <button type="button" class="auth-tab" data-tab="signup">회원가입</button>
      </div>

      <form id="signin-form" class="auth-form">
        <input type="email" id="signin-email" placeholder="이메일" required autocomplete="email" />
        <input type="password" id="signin-password" placeholder="비밀번호" required autocomplete="current-password" />
        <button type="submit" class="btn btn-primary">로그인</button>
      </form>

      <form id="signup-form" class="auth-form hidden">
        <input type="email" id="signup-email" placeholder="이메일" required autocomplete="email" />
        <input type="password" id="signup-password" placeholder="비밀번호 (6자 이상)" required autocomplete="new-password" minlength="6" />
        <button type="submit" class="btn btn-primary">회원가입</button>
      </form>
    </div>
  </div>

  <!-- 앱 화면 -->
  <div id="app-view" class="app-view hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo">cowork</span>
        <button id="logout-btn" class="btn btn-ghost btn-small">로그아웃</button>
      </div>
      <button id="new-page-btn-top" class="btn btn-primary btn-block">+ 새 페이지</button>
      <ul id="page-list" class="page-list"></ul>
      <button id="new-page-btn-bottom" class="btn btn-primary btn-block">+ 새 페이지</button>
    </aside>

    <main class="content">
      <div id="empty-state" class="empty-state">
        <p>왼쪽에서 페이지를 선택하거나 새 페이지를 만들어보세요.</p>
      </div>

      <div id="page-editor" class="page-editor hidden">
        <div class="editor-toolbar">
          <input type="text" id="page-title" class="page-title-input" placeholder="제목 없음" />
          <button id="delete-page-btn" class="btn btn-danger">삭제</button>
        </div>
        <textarea id="page-content" class="page-content-input" placeholder="내용을 입력하세요..."></textarea>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
